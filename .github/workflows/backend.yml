name: CI/CD Django Backend

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t jahnavi2909/spl-backend:latest .

      - name: Push to Docker Hub
        run: |
          docker push jahnavi2909/spl-backend:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/spl_backend_python-main

            docker pull jahnavi2909/spl-backend:latest

            docker compose down
            docker compose up -d

            docker exec -i django-backend python manage.py migrate
            docker exec -i django-backend python manage.py collectstatic --noinput