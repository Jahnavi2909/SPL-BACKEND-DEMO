version: '3.9'

services:
  backend:
    image: jahnavi2909/spl-backend:latest
    container_name: django-backend
    restart: always
    command: gunicorn SPLDEMO.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - static_volume:/app/staticfiles
    ports:
      - "8000:8000"
    env_file:
      - .env

  nginx:
    image: nginx:latest
    container_name: nginx-server
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - static_volume:/app/staticfiles
    depends_on:
      - backend

volumes:
  static_volume: